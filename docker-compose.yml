version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ski-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ski_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ski-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ski-backend
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ski_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      VIDEO_STORAGE_PATH: /shared-data/originals
      AI_ENGINE_URL: http://ai-engine:8001
    volumes:
      - ./ai-engine/data:/shared-data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-engine:
    build: ./ai-engine
    container_name: ski-ai-engine
    ports:
      - "8001:8001"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      YOLO_MODEL_PATH: /models/yolo11n.pt
      CHROMA_DB_PATH: /data/chroma
      ANNOTATED_VIDEO_PATH: /shared-data/annotated
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your_openai_api_key}
    volumes:
      - ai_models:/models
      - chroma_data:/data/chroma
      - ./ai-engine/data:/shared-data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ski-frontend
    ports:
      - "9095:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  ai_models:
  chroma_data:

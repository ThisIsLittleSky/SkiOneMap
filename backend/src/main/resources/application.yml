spring:
  application:
    name: ski-monitor

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/ski_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:9}

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  global-config:
    db-config:
      id-type: auto

server:
  port: 8085

app:
  video:
    storage-path: ${VIDEO_STORAGE_PATH:../ai-engine/data/originals}
  ai-engine:
    base-url: ${AI_ENGINE_URL:http://localhost:8001}
